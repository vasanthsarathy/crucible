name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  manifests:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate marketplace.json and plugin.json are well-formed
        run: |
          jq empty .claude-plugin/marketplace.json
          jq empty plugins/crucible-rdd/.claude-plugin/plugin.json
          echo "manifests OK"

  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Ruff lint
        working-directory: plugins/crucible-rdd/mcp-server
        run: uv run --extra dev ruff check
      - name: Ruff format check
        working-directory: plugins/crucible-rdd/mcp-server
        run: uv run --extra dev ruff format --check
      - name: Mypy type-check
        working-directory: plugins/crucible-rdd/mcp-server
        run: uv run --extra dev mypy src

  test:
    name: MCP server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Run pytest
        working-directory: plugins/crucible-rdd/mcp-server
        run: uv run --extra dev python -m pytest -q
